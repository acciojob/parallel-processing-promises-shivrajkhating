<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Downloader</title>
</head>
<body>

  <!-- ✅ Button add kiya -->
  <button id="download-images-button">Download Images</button>

  <div id="loading" style="display:none;">Loading...</div>
  <div id="error"></div>
  <div id="output"></div>

  <script>
    // ✅ Exact URLs jo Cypress expect karta hai
    const imageUrls = [
      "https://picsum.photos/id/237/200/300",
      "https://picsum.photos/id/238/200/300",
      "https://picsum.photos/id/239/200/300"
    ];

    function downloadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = url;
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Failed to download image: ${url}`));
      });
    }

    function downloadImages() {
      const loading = document.getElementById('loading');
      const output  = document.getElementById('output');
      const error   = document.getElementById('error');

      loading.style.display = 'block';

      Promise.all(imageUrls.map(url => downloadImage(url)))
        .then((images) => {
          loading.style.display = 'none';
          images.forEach(img => output.appendChild(img));
        })
        .catch((err) => {
          loading.style.display = 'none';
          error.textContent = err.message;
        });
    }

    // ✅ Auto call NAHI — sirf button click pe chalega
    document.getElementById('download-images-button').onclick = downloadImages;
  </script>

</body>
</html>
