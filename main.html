<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Downloader</title>
</head>
<body>

  <div id="loading" style="display:none;">Loading...</div>
  <div id="error"></div>
  <div id="output"></div>

  <script>
    const imageUrls = [
      "https://picsum.photos/id/1/200",
      "https://picsum.photos/id/2/200",
      "https://picsum.photos/id/3/200"
    ];

    // Single image download karne ka promise
    function downloadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = url;
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Failed to download image: ${url}`));
      });
    }

    // Saari images ek saath download karo
    function downloadImages() {
      const loading = document.getElementById('loading');
      const output  = document.getElementById('output');
      const error   = document.getElementById('error');

      // Spinner dikhao
      loading.style.display = 'block';

      Promise.all(imageUrls.map(url => downloadImage(url)))
        .then((images) => {
          // Spinner chupao
          loading.style.display = 'none';

          // Saari images output div mein daalo
          images.forEach(img => output.appendChild(img));
        })
        .catch((err) => {
          // Spinner chupao
          loading.style.display = 'none';

          // Error message dikhao
          error.textContent = err.message;
        });
    }

    // Page load hote hi shuru karo
    downloadImages();
  </script>

</body>
</html>
